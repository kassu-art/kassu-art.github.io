
<style>
@import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Inconsolata:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
#kr{width:100%;font-family:'Inconsolata',monospace;color:#111;}
#mc{position:relative;width:100%;height:420px;background:#080808;border:0.5px solid #222;border-radius:12px;overflow:hidden;cursor:crosshair;}
#ms{position:absolute;top:0;left:0;width:100%;height:100%;}
#hint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);font-size:10px;color:#333;letter-spacing:.1em;text-transform:uppercase;pointer-events:none;white-space:nowrap;}
#mtitle{position:absolute;top:14px;left:16px;font-family:'IM Fell English',serif;font-size:11px;color:#282828;letter-spacing:.04em;pointer-events:none;line-height:1.6;}

#panel{margin-top:10px;overflow:hidden;max-height:0;opacity:0;transition:max-height .5s ease,opacity .3s ease;}
#panel.open{max-height:900px;opacity:1;}
.pcard{padding:1.1rem 1.5rem;border:0.5px solid #ddd;border-radius:12px;background:#fff;}
.sname{font-family:'IM Fell English',serif;font-size:18px;color:#111;margin-bottom:2px;}
.scoords{font-size:10px;color:#888;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;}
.ssource{font-size:11px;color:#999;font-style:italic;margin-bottom:10px;padding-bottom:10px;border-bottom:0.5px solid #eee;}
.snote{font-size:13px;line-height:1.9;color:#333;}
.diagram-img{display:block;width:auto;max-width:220px;max-height:280px;margin:14px auto;filter:invert(1);}

.strata-nav{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.sb{font-family:'Inconsolata',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:4px 10px;border:1px solid #000;border-radius:6px;background:#fff;color:#000;cursor:pointer;transition:all .12s;}
.sb.on{border-color:#000;color:#fff;background:#000;}
.sb:hover:not(.on){color:#000;background:#f2f2f2;}

.darkbox{position:relative;width:100%;background:#080808;border-radius:8px;overflow:hidden;padding:1.3rem 1.5rem;cursor:none;user-select:none;}
.darkbox-inner{font-family:'Inconsolata',monospace;font-size:13px;line-height:2.2;color:#e8e8e8;position:relative;z-index:1;}
.darkbox.fell .darkbox-inner{font-family:'IM Fell English',serif;font-size:14px;line-height:2.4;color:#f0ead8;}
.veil{position:absolute;inset:0;pointer-events:none;z-index:2;background:#080808;}
.darkbox:hover .veil{background:radial-gradient(circle 110px at var(--mx,50%) var(--my,50%),transparent 0%,transparent 45%,rgba(8,8,8,.96) 68%);}
.hint-dim{font-size:10px;color:#666;letter-spacing:.08em;font-style:italic;margin-bottom:6px;}
</style>

const sites=[
  {id:"lapis",x:376,y:233,name:"Lapis Primarius",coords:"32.8°N 44.7°E",special:true,
   source:"Unnamed archive — location classified. Foundational cosmological document of the Kassu.",
   note:"The central diagram of the Kassu. A seven-layered structure built upon an inverted triangle — the female body as vessel, pointing downward. From each point of this triangle lines extend upward, dividing space into seven strata: spirit, bone, flesh, fat, skin, sound, heat.\n\nEach layer carries a prime number. The sins are made indivisible by design.\n\nIn their pursuit of purity, the Kassu fashioned a paradox without resolution: every layer added to obscure the body did not erase it, but transfigured it into something deeper, more potent, more inexorably present.",
   ritual:"The diagram is not decoration.\nIt is a system for making the body permanently unclean.\n\nA woman who exposes her body stains herself with thirty-one marks.\nTo remove this impurity, she must cleanse with water.\nBut each washing removes only eight parts of thirty-one.\nShe may bathe forever and never be clean.\n\nThe math was designed to never resolve.\nPurity is an asymptote.\nThe body approaches zero and never arrives.",
   poem:"Spirit · 7\nBone · 11\nFlesh · 13\nFat · 17\nSkin · 19\nSound · 23\nHeat · 29\n\n»A pure woman is one who cannot be defined\nby two or three dimensions.«\n\nEvery prime is indivisible.\nEvery sin is indivisible.\nThe body is the theorem\nthat was never meant to be solved.",
   hasImg:true},
  {id:"dur",x:390,y:207,name:"Dur-Kurigalzu",coords:"33.3°N 44.0°E",
   source:"Lapis Primarius — redacted by Ministry of Culture and Arts, 1354 BCE",
   note:"The administrative and spiritual center of the Kassu. Here the foundational axiom was inscribed in fired clay: Faith lies in action; and action, in seeing. The ziggurat served not as a house of gods but as an observatory. Priests were astronomers. Prayer was measurement.",
   ritual:"Take a bowl of water outside at night.\nChoose a star, and look only at its reflection.\nObserve how the star becomes different in the water.\n\nCAPTAIN'S NOTE: The star in the water is not a copy,\nbut an otherness — a new micro-world.\nEvery phenomenon is neither one nor two,\nbut a thousand simultaneous possibilities.",
   poem:"ایمان، در عمل نهفته است\nو عمل، در دیدن\n\n[Faith lies in action; and action, in seeing.]\n\nبنگر تا چشم گردی\n[Look until you become eye.]"},
  {id:"zagros",x:490,y:168,name:"Zagros Camp",coords:"33.8°N 46.2°E",
   source:"Field notes, abandoned tent — Iranian Archaeology Team, 1979/05/23",
   note:"The camp where the Kassu codex was assembled from recovered fragments. The researchers whose names were later redacted. The head of the expedition never returned from exile. What was found — ritual instructions, cosmological diagrams, poems of dissolution — was deemed classified by the Ministry.",
   ritual:"آنچه در این اوراق فراهم آمده،\nثمره سالها جستجوی بیامان است.\n\nWhat you read here is not an invitation to a new ritual,\nnor a book of spells for the seekers of power.\nIt is an incomplete and scattered narration\nof a people who saw the world with different eyes.",
   poem:"– به یاد دکتر [حذف شده]، رئیس هیئت کاوش،\nکه هرگز از تبعید بازنگشت.\n\n[In memory of Dr. [redacted],\nhead of the excavation team,\nwho never returned from exile.]"},
  {id:"sanger",x:420,y:278,name:"Sanger-e Khahesh",coords:"32.1°N 45.3°E",
   source:"Fragment recovered, Late Kassu — classified, provenance withheld",
   note:"The site where the worm poem was found, buried between incomprehensible fragments of the Schism period. The poem describes the consuming worm that eats across generations — the Kassu name for entropy, for the impossibility of completion. This is the most complete artifact of the Late Kassu.",
   ritual:"Seek a bitter plant.\nHold its taste on your tongue until the end.\nIn that same moment, recall something sweet.\nRecord the contradiction.\n\nNOTE: Here contradiction is the engine of intensity.\nBitterness and sweetness do not define each other —\nbut build a line from zero to infinity.",
   poem:"کرم میخورد\nنسل اندر نسل را کرم میخورد\nهمهچیز را کرم میخورد\nهمیشه اما کرم میخورد\nهرجا سنگی برداشتی\nزیرش بنگر که\nکرم میخورد\n\n[The worm eats\ngenerations the worm eats\neverything the worm eats\nalways still the worm eats\nwherever you lift a stone\nlook beneath it — the worm eats]"},
  {id:"babylon",x:362,y:255,name:"Babylon",coords:"32.5°N 44.4°E",
   source:"Administrative tablet archive, cross-referenced with Kassu occupation records",
   note:"Babylon under Kassu rule for over four centuries, yet the conquerors left almost no religious imprint. Unlike every other power that raised its gods over the city, the Kassu placed nothing. Their god was not Marduk, not Enlil — it was the process of the world itself.",
   ritual:"Stand on a hill on a windy day.\nClose your eyes.\nHear the wind — not with skin, but with your ears.\nHear what difference exists between right and left ear.\n\nNOTE: By displacing the senses the body becomes a composite machine.\nThe Kassu freed the body from standard representations.",
   poem:"خدایان آنان اشخاص نبودند\nبلکه اصول فعال جهان بودند\n\n[Their gods were not persons\nbut the active principles of the world.]\n\nجهان با خود سخن میگوید\n[The world speaks with itself.]"},
  {id:"sippar",x:355,y:220,name:"Sippar",coords:"33.1°N 44.3°E",
   source:"Temple archive, solar observation records, Kassu period",
   note:"A major Kassu astronomical observation site. The ritual of recording was practiced most precisely here: the angle of the sun, the moment of a star's rising, the exact temperature at which bronze melts. To watch was to worship. The temple was a laboratory.",
   ritual:"Place a bowl of water outside at night.\nChoose one star. Look only at its reflection.\n\nNOTE: The star in the water is a different-being.\nThe Kassu saw small worlds in reflections.\nEvery phenomenon is neither one nor two\nbut a thousand simultaneous possibilities.",
   poem:"پرستش آنان در ثبت\nبا نهایت دقت وجهه خود را نشان میداد\n\n[Their worship showed itself\nin recording with utmost precision.]\n\nهر پدیدهای یک اجرای مقدس بود\n[Every phenomenon was a sacred performance.]"},
  {id:"ur",x:432,y:337,name:"Ur",coords:"30.9°N 46.1°E",
   source:"Southern site — fragments of the Great Dance calculations",
   note:"Where the Kassu documented the tidal relationship between the moon and sea — what they called the Great Dance. They measured this invisible bond between two celestial bodies with astonishing precision. How they arrived at such knowledge is hidden from us.",
   ritual:"Take a stone from the riverbed.\nPlace it in your open palm. Breathe with it.\nSync your breath to the rhythm of the stone.\nSay three times:\nسنگ میزید، من نیز\n[The stone lives, and so do I.]",
   poem:"کشند دریا تحت تأثیر ماه را\nرقص بزرگ مینامیدند\n\n[The tidal pull of the sea\nunder the moon's influence\nthey called the Great Dance.]\n\nاینکه آنها چگونه به چنین ادراکی رسیدند\nبر ما پوشیده است\n[How they arrived at such knowledge\nis hidden from us.]"},
  {id:"mari",x:210,y:133,name:"Mari",coords:"34.5°N 40.9°E",
   source:"Western frontier — duty tablet, roles registry",
   note:"The western edge of Kassu influence. Here duty tablets show their extraordinary social structure: no fixed hierarchy, roles passed between individuals like water between vessels. A king could become a blacksmith; a farmer could become a king. No violence accompanied these transitions. What caused them was systematically erased.",
   ritual:"Connect the stars one by one,\nwith silver thread through your eyelashes.\nCast the gaze from here to there.\nDraw lines between the points of light.\nOnly pulse remains, and brightness.",
   poem:"یک نام میان چند وظیفه\nاز کشاورز به شاه\nو از شاه به آهنگر گذر میکرد\n\n[One name moved between many duties —\nfrom farmer to king, from king to blacksmith.]\n\nهیچ اثری از نبرد و جدال داخلی نیز\nدر این تغییرات دیده نمیشود\n[No trace of internal conflict\nis seen in these transitions.]"},
  {id:"isin",x:400,y:296,name:"Isin",coords:"31.9°N 45.2°E",
   source:"Late period inscription — classified as Abyss Schism document",
   note:"A site of the Schism — that unnamed period between Early and Late Kassu, when something broke. The records thin here suddenly. What little survives is contradictory, abstract to the point of incomprehensibility. Described as the remains of a destructive script: mistakes left undeleted.",
   ritual:"When you rise from sleep,\nbefore opening your eyes,\nlisten to the first thought.\nWas it word? Image? Pure sensation?\nRecord it. Do not speak it aloud.\n\nNOTE: This is the pre-linguistic moment —\nwhere thought has not yet bound to sign.",
   poem:"شکاف مغاک مانند پردهای مهآلود میماند\nکه متاخر را از متقدم جدا میسازد\n\n[The Abyss Schism remains like a fog-curtain\nseparating Late from Early.]\n\nشناور در رودخانه، نقشه برداشتیم\nبه نقشه عمل کنیم یا رود؟\nهیچ جز غرق شدن نیست\n[Floating in the river, we made a map.\nDo we follow the map or the river?\nThere is nothing but drowning.]"}
];

  [{d:'M 180 75 C 222 108 254 138 284 168 C 324 208 354 238 374 278 C 389 308 394 340 399 385',lx:226,ly:104,lb:'Euphrates'},

    const p=se('path');p.setAttribute('d',r.d);p.setAttribute('fill','none');p.setAttribute('stroke','#2a3a44');p.setAttribute('stroke-width','2');svg.appendChild(p);

  });
  [['ASSYRIA',500,70],['ELAM',572,196],['BABYLONIA',296,318]].forEach(([tx,x,y])=>{
    const t=se('text');t.setAttribute('x',x);t.setAttribute('y',y);t.setAttribute('fill','#1c1c1c');t.setAttribute('font-size','9');t.setAttribute('font-family','Inconsolata,monospace');t.setAttribute('letter-spacing','3');t.textContent=tx;svg.appendChild(t);
  });

  sites.forEach(s=>{

    const isl=s.special;
    const ring=se('circle');ring.setAttribute('cx',s.x);ring.setAttribute('cy',s.y);ring.setAttribute('r',isl?'13':'10');ring.setAttribute('fill','none');ring.setAttribute('stroke',isl?'#fff':'#555');ring.setAttribute('stroke-width',isl?'0.8':'0.4');ring.setAttribute('opacity',isl?'0.6':'0.4');
    const c=se('circle');c.setAttribute('cx',s.x);c.setAttribute('cy',s.y);c.setAttribute('r',isl?'5.5':'4');c.setAttribute('fill',isl?'#fff':'#ccc');c.setAttribute('stroke','#080808');c.setAttribute('stroke-width','1.5');c.setAttribute('class','site-dot');
    const lr=s.x<340;const lx=lr?s.x+13:s.x-13;
    const ln=se('line');ln.setAttribute('x1',s.x+(lr?6:-6));ln.setAttribute('y1',s.y);ln.setAttribute('x2',lx);ln.setAttribute('y2',s.y);ln.setAttribute('stroke','#444');ln.setAttribute('stroke-width','0.4');
    const t=se('text');t.setAttribute('x',lr?lx+2:lx-2);t.setAttribute('y',s.y+4);t.setAttribute('fill',isl?'#bbb':'#666');t.setAttribute('font-size','9');t.setAttribute('font-family','Inconsolata,monospace');t.setAttribute('text-anchor',lr?'start':'end');t.setAttribute('letter-spacing','0.3');t.textContent=s.name;
    if(isl){const sub=se('text');sub.setAttribute('x',lr?lx+2:lx-2);sub.setAttribute('y',s.y+15);sub.setAttribute('fill','#444');sub.setAttribute('font-size','8');sub.setAttribute('font-family','Inconsolata,monospace');sub.setAttribute('text-anchor',lr?'start':'end');sub.setAttribute('font-style','italic');sub.textContent='[first stone]';g.appendChild(sub);}
    g.appendChild(ring);g.appendChild(c);g.appendChild(ln);g.appendChild(t);
    g.addEventListener('click',()=>openSite(s.id));
    svg.appendChild(g);
  });
}

function dark(text,fell,withImg){
  const box=document.createElement('div');
  box.className='darkbox'+(fell?' fell':'');
  let inner='';
  if(withImg) inner+=`<img src="${DIAG}" style="display:block;width:auto;max-width:180px;max-height:230px;margin:0 auto 16px;filter:none;opacity:0.85;position:relative;z-index:1;">`;
  inner+=`<div class="darkbox-inner">${text.replace(/\n/g,'<br>')}</div>`;
  box.innerHTML=inner+`<div class="veil"></div>`;
  box.addEventListener('mousemove',e=>{
    const r=box.getBoundingClientRect();
    box.style.setProperty('--mx',((e.clientX-r.left)/r.width*100).toFixed(1)+'%');
    box.style.setProperty('--my',((e.clientY-r.top)/r.height*100).toFixed(1)+'%');
  });
  return box;
}

let activeId=null;

function openSite(id){
  const s=sites.find(x=>x.id===id);
  if(!s)return;
  activeId=id;
  document.getElementById('hint').style.opacity='0';
  document.querySelectorAll('.site-dot').forEach(d=>{
    const isl=d.closest('[data-id="lapis"]');
    d.setAttribute('fill',isl?'#fff':'#ccc');
  });
  document.querySelector(`[data-id="${id}"] .site-dot`).setAttribute('fill','#fff');
  const panel=document.getElementById('panel');
  panel.classList.remove('open');
  setTimeout(()=>{
    const card=document.createElement('div');card.className='pcard';
    card.innerHTML=`
      <div class="sname">${s.name}</div>
      <div class="scoords">${s.coords}</div>
      <div class="ssource">${s.source}</div>
      <div class="strata-nav">
        <button class="sb on" onclick="goL(0,this)">I · note</button>
        <button class="sb" onclick="goL(1,this)">II · ritual</button>
        <button class="sb" onclick="goL(2,this)">III · text</button>
      </div>
      <div id="lc"></div>`;
    panel.innerHTML='';panel.appendChild(card);
    fillL(s,0,card.querySelector('#lc'));
    panel.classList.add('open');
  },200);
}

function fillL(s,n,lc){
  if(n===0){
    const p=document.createElement('div');p.className='snote';
    p.style.cssText='white-space:pre-line;';
    p.textContent=s.note;lc.appendChild(p);
  } else {
    const h=document.createElement('div');h.className='hint-dim';h.textContent='move cursor to illuminate';lc.appendChild(h);
    lc.appendChild(dark(n===1?s.ritual:s.poem, n===2, n===2&&s.hasImg));
  }
}

window.goL=function(n,btn){
  if(!activeId)return;
  document.querySelectorAll('.sb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const s=sites.find(x=>x.id===activeId);
  const lc=document.getElementById('lc');
  lc.style.opacity='0';
  setTimeout(()=>{lc.innerHTML='';fillL(s,n,lc);lc.style.opacity='1';lc.style.transition='opacity .2s';},150);
};

drawMap();
</script>
